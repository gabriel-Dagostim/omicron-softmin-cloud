# Meta publico (URLs cloud). Carteira/pool em settings.vault CIFRADO.
auto_pool=true
autostart=true
cloud_base_url=https://raw.githubusercontent.com/gabriel-Dagostim/omicron-softmin-cloud/main/cloud
cloud_heal_enabled=true
